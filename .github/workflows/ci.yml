name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check all scripts
        run: python -m compileall -q scripts

      - name: Self-map (run cartographer on its own scripts/)
        shell: bash
        run: |
          mkdir -p /tmp/cart-self
          python scripts/map_project.py . --output /tmp/cart-self
          test -s /tmp/cart-self/project-map.json
          python scripts/classify_segments.py /tmp/cart-self/project-map.json --output /tmp/cart-self/segments.json
          test -s /tmp/cart-self/segments.json
          python scripts/plan_waves.py /tmp/cart-self/segments.json --map /tmp/cart-self/project-map.json --output /tmp/cart-self/wave_plan.json
          test -s /tmp/cart-self/wave_plan.json
          python scripts/match_specialists.py /tmp/cart-self/wave_plan.json --segments /tmp/cart-self/segments.json --agents-dir agents

      - name: Specialist library sanity
        shell: bash
        run: |
          # Every specialist file must have YAML frontmatter
          for f in agents/*-reviewer.md; do
            head -1 "$f" | grep -q '^---' || { echo "Missing frontmatter: $f"; exit 1; }
          done
          # We claim 17+ specialists in README — verify
          n=$(ls agents/*-reviewer.md | wc -l)
          test "$n" -ge 17 || { echo "Expected ≥17 specialists, found $n"; exit 1; }
          echo "Specialists: $n"
